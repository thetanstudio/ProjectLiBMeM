<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 300px;

            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            cursor: pointer;
        }

        h2 {
            margin-top: 0;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>LiBMeM Login</h2>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Enter Name"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
