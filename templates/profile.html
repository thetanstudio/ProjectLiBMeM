<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        .box {
            width: 350px;
            margin: 100px auto;

            background: white;

            padding: 30px;
            border-radius: 15px;

            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            cursor: pointer;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="box">

    <a href="/dashboard">⬅ Back</a>

    <h2>Edit Profile</h2>

    <form method="POST">

        <input
            type="text"
            name="username"
            value="{{ user }}"
            required
        >

        <button type="submit">
            Save Changes
        </button>
        <br><br>

<a href="/logout">

    <button type="button">
        Logout
    </button>

</a>

    </form>

</div>

</body>
</html>
