<!DOCTYPE html>
<html>
<head>
    <title>Edit Return Date</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            cursor: pointer;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">

    <a href="/issue">⬅ Back</a>

    <h2>Edit Expected Return Date</h2>

    <p>
        <b>{{ issue.book_id }}</b> -
        {{ issue.student }}
    </p>

    <form method="POST">

        <input
            type="date"
            name="return_date"
            value="{{ issue.expected_return }}"
            required
        >

        <button type="submit">
            Save Changes
        </button>

    </form>

</div>

</body>
</html>
