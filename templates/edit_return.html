<!DOCTYPE html>
<html>
<head>
    <title>Edit Return Date</title>
</head>

<body style="margin:0; font-family:sans-serif; background:#f5f5f5;">

<div style="display:flex; height:100vh;">

    <!-- SAME SIDEBAR -->
    <div style="width:220px; background:#111; color:white; padding:20px;">
        <h2>LiBMeM</h2>
        <hr>

        <p><a href="/dashboard" style="color:white;">Dashboard</a></p>
        <p><a href="/books" style="color:white;">Add Books</a></p>
        <p><a href="/students" style="color:white;">Add Students</a></p>
        <p><a href="/issue" style="color:white;">Issue Books</a></p>
    </div>

    <!-- MAIN -->
    <div style="flex:1; padding:40px;">

        <h2>Edit Return Date</h2>

        <div style="background:white; padding:20px; width:300px; border-radius:10px; margin-top:20px;">

            <p><b>{{ issue.book_name }}</b></p>
            <p>{{ issue.student }} ({{ issue.class }})</p>

            <form method="POST">

                <input type="date" name="return_date" required
                       style="display:block; margin:10px 0; width:100%;">

                <button>Save</button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
